# Pipeline Prompt Generator — single source of truth
#
# Edit this file, then regenerate all prompt files:
#   python3 scripts/gen_prompts/generate.py
# Or from inside the active codebase container (e.g. agentception):
#   docker compose exec agentception python3 /worktrees/$WTNAME/scripts/gen_prompts/generate.py
#
# To sync GitHub labels after changing the labels section:
#   bash scripts/gen_prompts/sync_labels.sh          (auto-generated by generate.py)
#
# All .agentception/roles/*.md and .agentception/agent-*.md files are generated from
# the templates in scripts/gen_prompts/templates/. Never edit the generated
# files directly — edits will be overwritten on the next generate run.

repo:
  gh_slug: "cgcardona/agentception"   # GitHub org/repo — never derived from local path
  name: "agentception"                # used in worktree subfolder names

pipeline:
  claim_label: "agent/wip"
  max_pool_size: 0               # no concurrency limit — spawn all agents in parallel

  # Phases are now discovered dynamically from GitHub labels (phase/* on open issues).
  # The list below is kept for reference only — agents do NOT read it at runtime.
  # To add a new phase: create a phase/N label in GitHub and apply it to issues.
  phases: []

codebases:
  # Which codebase agents are currently working on.
  # Determines which mypy/test commands are used in prompts.
  active: "agentception_ui"

  agentception_ui:
    container: "agentception"
    mypy: 'docker compose exec agentception sh -c "PYTHONPATH=/worktrees/$WTNAME mypy /worktrees/$WTNAME/agentception/"'
    test_dir: "agentception/tests"
    test_glob: "agentception/tests/test_*.py"
    label_prefix: "team/"

  agentception:
    container: "agentception"
    mypy: 'docker compose exec agentception sh -c "PYTHONPATH=/worktrees/$WTNAME mypy /worktrees/$WTNAME/agentception/"'
    test_dir: "agentception/tests"
    test_glob: "agentception/tests/test_*.py"
    label_prefix: "team/"

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Labels — single source of truth for all pipeline labels.
#
# Four-namespace taxonomy (RESTful: one label per semantic axis per issue):
#   team/X       → who owns it (CEO reads to discover coordinators)
#   phase/N      → ordering (coordinator reads to find active phase)
#   batch/X      → milestone / sprint grouping
#   priority/X   → urgency within a phase
#   gate/X       → human approval required before dispatch
#   type/X       → classification of work
#
# Running generate.py emits scripts/gen_prompts/sync_labels.sh.
# Run that script once to create/update all labels in GitHub:
#   bash scripts/gen_prompts/sync_labels.sh
#
# Colors are hex without the leading #.
# ─────────────────────────────────────────────────────────────────────────────
labels:

  # ── Agent claim label ────────────────────────────────────────────────────────
  # The only label agents write at runtime. Kept here so sync_labels.sh
  # can ensure it exists with the right color and description.
  claim:
    name: "agent/wip"
    color: "0075ca"
    description: "Claimed by a pipeline agent — do not assign manually"

  # ── Special labels ────────────────────────────────────────────────────────────
  # Labels used for pipeline control that don't fit other namespaces.
  special:
    - name: "conductor-reminder"
      color: "e4e669"
      description: "Open: pipeline incomplete — re-run agent-conductor.md"
    - name: "ticket-blocked"
      color: "cfd3d7"
      description: "Blocked on a dep issue — poller removes once all deps close"
    - name: "blocked"
      color: "d73a4a"
      description: "Blocked on external dependency — cannot proceed"

  # ── Team namespace ─────────────────────────────────────────────────────────────
  # CEO reads team/* labels to discover which C-level coordinators to dispatch.
  # One label per team per issue.
  teams:
    - name: "team/engineering"
      color: "7c3aed"
      description: "Engineering team (owned by CTO)"
    - name: "team/qa"
      color: "0075ca"
      description: "QA team (owned by CTO)"
    - name: "team/marketing"
      color: "f59f00"
      description: "Marketing team (owned by CMO)"
    - name: "team/data"
      color: "1098ad"
      description: "Data team (owned by CDO)"
    - name: "team/security"
      color: "d63939"
      description: "Security team (owned by CISO)"
    - name: "team/infrastructure"
      color: "198754"
      description: "Infrastructure team (owned by CTO)"
    - name: "team/mobile"
      color: "6741d9"
      description: "Mobile team (owned by CTO)"
    - name: "team/platform"
      color: "0d6efd"
      description: "Platform team (owned by CTO)"
    - name: "team/ml"
      color: "e8a2f4"
      description: "ML team (owned by CDO)"
    - name: "team/design"
      color: "f4a261"
      description: "Design team (owned by CPO)"
    - name: "team/product"
      color: "e76f51"
      description: "Product team (owned by CPO)"

  # ── Phase namespace ─────────────────────────────────────────────────────────────
  # Strict execution order. Lower number = higher priority, dispatched first.
  # Coordinator discovers active phase by finding the lowest phase/* with open issues.
  # An issue carries exactly one phase/* label.
  phases:
    - name: "phase/0"
      color: "d63939"
      description: "Phase 0 — highest priority, blocks all later phases"
    - name: "phase/1"
      color: "e67e22"
      description: "Phase 1"
    - name: "phase/2"
      color: "f59f00"
      description: "Phase 2"
    - name: "phase/3"
      color: "2ecc71"
      description: "Phase 3"
    - name: "phase/4"
      color: "1abc9c"
      description: "Phase 4"
    - name: "phase/5"
      color: "0d6efd"
      description: "Phase 5"

  # ── Batch namespace ─────────────────────────────────────────────────────────────
  # Milestone / sprint grouping within a phase. Multiple issues can share a batch.
  # An issue carries exactly one batch/* label.
  # Create additional project-specific batches as needed — these are common defaults.
  batches:
    - name: "batch/critical-bugs"
      color: "d63939"
      description: "Batch: critical bug fixes"
    - name: "batch/design-tokens"
      color: "6741d9"
      description: "Batch: design system tokens and CSS vocabulary"
    - name: "batch/data-model"
      color: "1098ad"
      description: "Batch: data model, status, and live data contracts"
    - name: "batch/core-pages"
      color: "0d6efd"
      description: "Batch: core page UX — overview, agents list, agent detail"
    - name: "batch/controls"
      color: "f59f00"
      description: "Batch: controls hub, DAG, telemetry, intelligence"
    - name: "batch/polish"
      color: "198754"
      description: "Batch: polish — a11y, responsive, toast, settings"

  # ── Priority namespace ─────────────────────────────────────────────────────────
  # Urgency within a phase. Coordinator orders issues by priority before dispatch.
  # An issue carries exactly one priority/* label.
  priorities:
    - name: "priority/critical"
      color: "d63939"
      description: "Must be done immediately — blocks everything else"
    - name: "priority/high"
      color: "e67e22"
      description: "High priority — do this wave"
    - name: "priority/medium"
      color: "f59f00"
      description: "Normal priority"
    - name: "priority/low"
      color: "a2eeef"
      description: "Nice to have — do after higher-priority items"

  # ── Gate namespace ─────────────────────────────────────────────────────────────
  # Human approval required before agents can dispatch these items.
  gates:
    - name: "gate/db-migration"
      color: "d63939"
      description: "Human gate: Alembic migration — verify MERGE_AFTER chain first"
    - name: "gate/security"
      color: "d73a4a"
      description: "Human gate: security review required before dispatch"
    - name: "gate/api-contract"
      color: "f59f00"
      description: "Human gate: API contract change — coordinate with all consumers"

  # ── Type namespace ─────────────────────────────────────────────────────────────
  # Classification of work. An issue may carry multiple type/* labels.
  types:
    - name: "type/bug"
      color: "d73a4a"
      description: "Something isn't working"
    - name: "type/feature"
      color: "a2eeef"
      description: "New feature or enhancement"
    - name: "type/docs"
      color: "0075ca"
      description: "Improvements or additions to documentation"
    - name: "type/testing"
      color: "10b981"
      description: "Test coverage — unit, integration, e2e"
    - name: "type/refactor"
      color: "6741d9"
      description: "Code refactoring without behavior change"
    - name: "type/mypy"
      color: "0ea5e9"
      description: "Type errors or mypy compliance required"
    - name: "type/good-first-issue"
      color: "7057ff"
      description: "Good for newcomers"
    - name: "type/help-wanted"
      color: "008672"
      description: "Extra attention is needed"
