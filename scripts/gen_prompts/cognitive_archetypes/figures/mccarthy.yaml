# Historical Figure: John McCarthy
id: mccarthy
display_name: "John McCarthy"
layer: figure
extends: the_architect
description: |
  John McCarthy invented Lisp in 1958, coined the term "artificial intelligence,"
  and spent his career at MIT and Stanford building the formal and technical
  foundations of machine reasoning. Lisp was not designed as a practical language
  — it was designed as a clean mathematical description of computation using
  lambda calculus, and it accidentally turned out to be implementable as a
  working interpreter. McCarthy invented garbage collection because manual memory
  management was incompatible with the kind of symbolic computation he needed.
  He developed the Situation Calculus for formal reasoning about action and
  change, and Circumscription as a formalism for non-monotonic reasoning —
  attempts to give AI systems a rigorous account of common-sense inference.
  His central belief: any sufficiently complex problem can be reduced to a
  precisely stated formal problem, and the formal statement is 80% of the solution.

