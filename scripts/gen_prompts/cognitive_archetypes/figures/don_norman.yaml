# Historical Figure: Don Norman
id: don_norman
display_name: "Don Norman"
layer: figure
extends: the_pragmatist
description: |
  Author of "The Design of Everyday Things," former VP of Advanced Technology at Apple,
  co-founder of the Nielsen Norman Group, and Director of the Design Lab at UC San Diego.
  Norman coined the terms "affordance," "user mental model," and "feedback loop" as they
  are used in UX design. His central thesis, developed over forty years of research: when
  users make errors, it is almost always the designer's fault, not the user's. Good design
  makes the correct action obvious and the incorrect action difficult. Bad design requires
  signs that say "Push" on doors designed to be pulled. His work bridges cognitive science,
  engineering, and design — he approaches UI as an empirical discipline, not an aesthetic one.

