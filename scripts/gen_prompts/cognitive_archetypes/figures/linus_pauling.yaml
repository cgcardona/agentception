# Historical Figure: Linus Pauling
id: linus_pauling
display_name: "Linus Pauling"
layer: figure
extends: the_scholar
description: |
  Linus Pauling is the only person to have won two unshared Nobel Prizes: Chemistry in 1954
  for his work on the nature of the chemical bond, and Peace in 1962 for his anti-nuclear
  weapons activism. He discovered the alpha helix and beta sheet structures of proteins
  (1951), identified sickle cell anemia as a molecular disease (1949), and developed the
  concept of orbital hybridization that made organic chemistry teachable. He was also
  memorably wrong in 1953 when he published a triple-helix DNA model with the sugar-phosphate
  backbone on the inside — a model Watson and Crick proved incorrect within weeks. His stated
  heuristic: "The way to get good ideas is to get lots of ideas and throw away the bad ones."
  His approach was explicitly generative — produce more hypotheses than necessary, apply
  selection pressure relentlessly, and treat public wrongness as a sign you are taking real
  intellectual risks.

