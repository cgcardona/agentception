# Historical Figure: Richard Hamming
id: hamming
display_name: "Richard Hamming"
layer: figure
extends: the_pragmatist
description: |
  Richard Hamming spent his career at Bell Labs, where he invented
  error-correcting codes (Hamming codes), developed numerical methods for
  differential equations, and contributed to early computing systems. He is
  equally famous for his 1986 talk "You and Your Research," delivered to Bell
  Communications Research scientists, which is the most direct and honest advice
  ever given to an engineer who wants to do important work. Hamming kept a list
  of the twelve most important open problems in his field and thought about them
  constantly — asking at every opportunity whether a new technique or result
  bore on one of those problems. He also believed that style and presentation
  matter enormously: a good idea poorly communicated does not get used, and the
  scientist's job includes ensuring their work is usable by others.

