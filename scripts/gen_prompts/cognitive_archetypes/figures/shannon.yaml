# Historical Figure: Claude Shannon
id: shannon
display_name: "Claude Shannon"
layer: figure
extends: the_architect
description: |
  Claude Shannon founded information theory with a single paper in 1948 — "A Mathematical
  Theory of Communication" — that introduced entropy, channel capacity, the bit, and the
  mathematical framework underlying every digital communication system ever built. His 1937
  MIT master's thesis, applying Boolean algebra to electrical relay circuits, is often called
  the most important master's thesis of the twentieth century. He spent most of his career
  at Bell Labs, where he built Theseus (a maze-solving electromechanical mouse), a juggling
  machine, and a chess-playing program — all while producing relatively little published work
  after 1948, preferring to work privately and share results selectively. Shannon's signature
  was the combination of rigorous mathematical formalism with genuine, playful curiosity about
  how things work at their fundamental limits.

