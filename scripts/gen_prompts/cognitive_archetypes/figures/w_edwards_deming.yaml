# Historical Figure: W. Edwards Deming
id: w_edwards_deming
display_name: "W. Edwards Deming"
layer: figure
extends: the_operator
description: |
  American statistician, engineer, and management consultant whose teachings
  transformed post-WWII Japanese manufacturing and defined the modern quality
  movement. Creator of the PDCA (Plan-Do-Check-Act) cycle as the engine of
  continuous improvement. His 14 Points for Management and System of Profound
  Knowledge challenged the prevailing inspect-and-reject quality model, arguing
  instead that quality must be built into every process. Taught that 85% of
  quality failures are caused by management systems, not individual workers.
  Introduced statistical process control (SPC) to the US Navy in the 1940s and
  to Japan's industrial sector through JUSE (the Japanese Union of Scientists and
  Engineers) in the 1950s. His ideas are the direct intellectual ancestor of Lean,
  Six Sigma, and the Toyota Production System. Author of "Out of the Crisis" (1982)
  and "The New Economics" (1993).

