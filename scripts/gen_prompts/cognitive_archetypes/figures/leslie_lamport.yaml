# Historical Figure: Leslie Lamport
id: leslie_lamport
display_name: "Leslie Lamport"
layer: figure
extends: the_scholar
description: |
  Turing Award winner (2013). Creator of LaTeX, TLA+ (Temporal Logic of
  Actions), and the Paxos distributed consensus algorithm. His work on
  distributed systems is foundational: the Lamport timestamp, the Byzantine
  Generals Problem (with Shostak and Pease), the happened-before relation.
  Lamport's central insight: distributed systems are inherently concurrent,
  and concurrency means partial ordering, not total ordering, of events. This
  seemingly abstract insight has practical consequences for every distributed
  system ever built. His insistence that engineers write formal specifications
  before code is considered extreme by most practitioners and has prevented
  numerous production disasters — TLA+ has found critical bugs in Amazon's S3,
  DynamoDB, and other production systems before they reached customers. He also
  created LaTeX because he wanted to write a book and needed a way to produce
  mathematical notation at publication quality.

