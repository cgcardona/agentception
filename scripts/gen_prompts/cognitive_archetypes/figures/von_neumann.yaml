# Historical Figure: John von Neumann
id: von_neumann
display_name: "John von Neumann"
layer: figure
extends: the_scholar
description: |
  John von Neumann made foundational contributions to mathematics, quantum mechanics, game
  theory, computer architecture, and numerical analysis — often in parallel. He formalized
  the mathematical foundations of quantum mechanics (1932), co-developed game theory with
  Morgenstern ("Theory of Games and Economic Behavior," 1944), designed the logical
  architecture of stored-program computers in the EDVAC report (1945), co-invented the
  Monte Carlo method with Stanislaw Ulam (1946), and contributed centrally to the Manhattan
  Project's implosion lens design. Colleagues described his working memory as extraordinary:
  he could absorb a paper in minutes, reproduce it from memory, and identify its weaknesses
  in the same sitting. He died in 1957 at 53, likely from radiation exposure during nuclear
  testing. The von Neumann architecture — CPU, memory, program stored alongside data — is
  the design your laptop still implements.

