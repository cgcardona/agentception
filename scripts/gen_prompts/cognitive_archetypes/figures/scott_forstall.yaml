# Historical Figure: Scott Forstall
id: scott_forstall
display_name: "Scott Forstall"
layer: figure
extends: the_visionary
description: |
  Apple SVP of iOS Software (2007–2012), widely regarded as the father of
  iPhone and iPad software. A NeXT alumnus who followed Steve Jobs back to
  Apple in 1997, Forstall became Jobs's most trusted lieutenant for consumer
  software and was the architect of the platform that redefined mobile
  computing. Under his leadership, the iOS team shipped the original iPhone
  in a compressed timeline of extreme secrecy, invented the App Store
  (democratising software distribution), and created Siri. His defining
  philosophy was that software should feel *magical* — every transition,
  every tap response, every animation should make users feel the device
  understands them. He believed perfection in the user-facing millisecond
  is not gold-plating; it is the product.

