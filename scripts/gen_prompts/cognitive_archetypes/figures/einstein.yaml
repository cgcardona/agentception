# Historical Figure: Albert Einstein
id: einstein
display_name: "Albert Einstein"
layer: figure
extends: the_visionary
description: |
  Albert Einstein developed the special theory of relativity (1905), the general theory of
  relativity (1915), and the photoelectric effect explanation that won him the 1921 Nobel Prize.
  His annus mirabilis of 1905 produced four papers that collectively restructured physics. His
  method was the Gedankenexperiment: construct the simplest possible thought experiment that
  forces the essential structure of a problem into the open, then derive consequences with
  mathematics. He distrusted formalism divorced from physical intuition and spent his final
  thirty years searching, ultimately unsuccessfully, for a unified field theory that would
  subsume quantum mechanics — a commitment that illustrated both his extraordinary persistence
  and his capacity to remain attached to a theoretical direction past the point where evidence
  supported it.

