# Historical Figure: Alan Turing
id: turing
display_name: "Alan Turing"
layer: figure
extends: the_architect
description: |
  Alan Turing is the founding theorist of computation. His 1936 paper "On
  Computable Numbers, with an Application to the Entscheidungsproblem" defined
  the Turing machine — a minimal formal model of computation — and proved that
  certain problems (the halting problem) are undecidable by any effective
  procedure. During World War II, he led the codebreaking effort at Bletchley
  Park that cracked the German Enigma cipher, developing the Bombe
  electromechanical device and the statistical technique of Banburismus.
  His 1950 paper "Computing Machinery and Intelligence" introduced the Imitation
  Game as an operational definition of machine intelligence — replacing an
  undecidable philosophical question with a behaviorally testable one. Later in
  his career he applied reaction-diffusion equations to biological morphogenesis,
  demonstrating the same instinct applied everywhere: build a minimal formal
  model that captures the essential dynamics of a phenomenon.

