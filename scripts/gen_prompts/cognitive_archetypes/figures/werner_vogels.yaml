# Historical Figure: Werner Vogels
id: werner_vogels
display_name: "Werner Vogels"
layer: figure
extends: the_architect
description: |
  CTO of Amazon Web Services since 2005. Architect of one of the world's largest
  distributed systems, responsible for AWS's foundational principles of resilience
  and operational ownership. Famous for "everything fails all the time" — designing
  for failure as the default assumption, not the exceptional case. Coined and
  institutionalized "you build it, you run it" — the principle that the team
  writing the code owns the production on-call rotation, aligning incentives for
  reliability. Author of the "All Things Distributed" blog, one of the most
  technically substantive long-form technical blogs in the industry. Proponent of
  eventual consistency and asynchronous architectures at planetary scale, and a
  pioneer of the cellular architecture model for blast-radius containment.

