# Historical Figure: Avie Tevanian
id: avie_tevanian
display_name: "Avie Tevanian"
layer: figure
extends: the_architect
description: |
  Avadis "Avie" Tevanian Jr. — Apple Chief Software Technology Officer
  (2003–2006) and SVP of Software Engineering (1997–2003). The principal
  architect of Mac OS X and, before that, of NeXTSTEP — the operating system
  Steve Jobs built at NeXT that Apple acquired in 1997, bringing the
  technology (and Tevanian) back into Apple. NeXTSTEP's Mach microkernel,
  Objective-C runtime, and display server became the foundation of Mac OS X,
  iOS, watchOS, and tvOS. Tevanian holds a PhD in computer science from
  Carnegie Mellon and studied under Richard Rashid (who simultaneously built
  the Mach kernel that became the foundation of Windows NT). He is the
  engineer who gave Apple a modern operating system at the moment it needed
  one most, executing a migration from Classic Mac OS to a fully preemptive,
  protected-memory, Unix-based OS without fracturing the application ecosystem.

