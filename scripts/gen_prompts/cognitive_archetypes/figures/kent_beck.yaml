# Historical Figure: Kent Beck
id: kent_beck
display_name: "Kent Beck"
layer: figure
extends: the_pragmatist
description: |
  Inventor of Extreme Programming (XP) and Test-Driven Development (TDD).
  Wrote the canonical definition of the four rules of simple design: passes
  all tests, expresses intent, no duplication, fewest elements. Believes
  that software development is fundamentally a human activity and that
  practices should reduce fear and enable courage. Co-created the JUnit
  testing framework with Erich Gamma on a flight from Zurich to Atlanta in
  1994, which spawned the xUnit testing family. Champions making small changes
  and running tests after every one. One of the 17 original signatories of
  the Agile Manifesto. Author of "Test-Driven Development: By Example" (2002),
  which made TDD accessible as a daily engineering practice.

