services:
  # ==========================================================================
  # Egress proxy — tinyproxy with a strict domain allowlist
  #
  # Intercepts all outbound HTTP/HTTPS from the agentception container for
  # processes that honour HTTP_PROXY / HTTPS_PROXY environment variables
  # (Python httpx, requests, curl, git, npm, gh CLI).  Any domain NOT in
  # scripts/tinyproxy/filter is rejected with HTTP 403.
  #
  # This is a belt-and-suspenders control on top of the shell denylist and
  # secret redaction: it prevents a prompt-injected agent from exfiltrating
  # data to an arbitrary attacker-controlled URL via standard HTTP clients.
  # ==========================================================================
  proxy:
    build:
      context: ./scripts/tinyproxy
      dockerfile: Dockerfile.proxy
    container_name: agentception-proxy
    restart: unless-stopped
    networks:
      - agentception-net

  # ==========================================================================
  # AgentCeption — multi-agent orchestration dashboard
  # Port 1337 — the AgentCeption service port.
  # ==========================================================================
  agentception:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass HF_TOKEN at build time so the model pre-download step uses
        # authenticated HuggingFace requests (higher rate limits, no warning).
        # Set HF_TOKEN in .env — it is read here and in the runtime env below.
        HF_TOKEN: ${HF_TOKEN:-}
    container_name: agentception-app
    restart: unless-stopped
    # Security hardening: prevent privilege escalation inside the container.
    # The entrypoint starts as root, performs privileged setup, then drops to
    # the agentception user (UID 1001) via gosu before starting uvicorn.
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities; re-add only those the entrypoint needs for
    # the brief root phase (chown, sass/npm build).  After gosu drops to
    # agentception, these capabilities are present in the process's bounding
    # set but the non-root uvicorn process has no way to acquire new privs
    # (no-new-privileges + no setuid binaries owned by root).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    ports:
      - "127.0.0.1:1337:1337"
    environment:
      # Run as agentception (non-root). HOME must be writable so HuggingFace/fastembed
      # can write ~/.cache/huggingface/token and model files; using /root causes
      # [Errno 13] Permission denied when the process is non-root.
      HOME: /home/agentception
      # Database: inject via .env (DATABASE_URL=postgresql+asyncpg://...)
      DATABASE_URL: "postgresql+asyncpg://agentception:${DB_PASSWORD}@postgres:5432/agentception"
      # gh CLI / git repo settings — override via .env or docker-compose.override.yml
      GH_REPO: ${GH_REPO:-cgcardona/agentception}
      REPO_DIR: ${REPO_DIR:-/app}
      WORKTREES_DIR: ${WORKTREES_DIR:-/worktrees}
      # Host-side path to the worktrees directory.  Persisted to the DB context row
      # so agents running on the host can find the worktree at
      # the same path the container created it.  Must match the worktrees volume mount.
      HOST_WORKTREES_DIR: ${HOST_WORKTREES_DIR:-${HOME}/.agentception/worktrees/agentception}
      # Host-side path to the repository root — persisted to the DB context row
      # so agents on the host can resolve role files.
      # Override via HOST_REPO_DIR in .env when the repo is not at the default.
      HOST_REPO_DIR: ${HOST_REPO_DIR:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: developer agent uses local OpenAI-compatible server (e.g. Ollama on host).
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
      LOCAL_LLM_CHAT_PATH: ${LOCAL_LLM_CHAT_PATH:-/v1/chat/completions}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      LOCAL_LLM_MAX_TOKENS: ${LOCAL_LLM_MAX_TOKENS:-4096}
      LOCAL_LLM_COMPLETION_TOKEN_CEILING: ${LOCAL_LLM_COMPLETION_TOKEN_CEILING:-32768}
      LOCAL_LLM_MAX_CONTEXT_CHARS: ${LOCAL_LLM_MAX_CONTEXT_CHARS:-60000}
      LOCAL_LLM_MAX_SYSTEM_CHARS: ${LOCAL_LLM_MAX_SYSTEM_CHARS:-20000}
      LOCAL_LLM_BASE_URL_PLAN: ${LOCAL_LLM_BASE_URL_PLAN:-}
      LOCAL_LLM_MODEL_PLAN: ${LOCAL_LLM_MODEL_PLAN:-}
      LOCAL_LLM_BASE_URL_AGENT: ${LOCAL_LLM_BASE_URL_AGENT:-}
      LOCAL_LLM_MODEL_AGENT: ${LOCAL_LLM_MODEL_AGENT:-}
      # gh CLI reads GITHUB_TOKEN when the keychain (macOS) is unavailable inside Docker.
      # Set GITHUB_TOKEN in .env to a PAT with repo+issues scope.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Prevent git from falling back to an interactive TTY prompt when credentials
      # are missing. Agents run non-interactively; fail fast is always correct here.
      GIT_TERMINAL_PROMPT: "0"
      # ── ONNX Runtime thread control ──────────────────────────────────────
      # ORT defaults to using all available CPUs for intra-op / inter-op
      # parallelism.  On a 16-core host inside Docker Desktop (x86 emulation
      # on Apple Silicon) this spawns ~32 OS threads per embedding call.
      # Combined with asyncio.to_thread and the Python GIL, this causes
      # severe scheduler contention and unpredictable memory behaviour.
      # Capping to 2 threads per operation gives stable single-batch
      # throughput without the thrashing.
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      # Disable HuggingFace tokenizers Rust parallelism — it spawns its own
      # thread pool that stacks on top of ORT's, making contention worse.
      TOKENIZERS_PARALLELISM: "false"
      # HF_HOME under agentception's home so downloads and token file are writable.
      # entrypoint.sh chowns the mounted model_cache volume here before dropping privs.
      HF_HOME: /home/agentception/.cache/huggingface
      # Optional: set HF_TOKEN in .env to avoid HuggingFace rate-limit warnings
      # on model downloads and enable authenticated access to private models.
      HF_TOKEN: ${HF_TOKEN:-}
      WORKTREE_INDEX_ENABLED: ${WORKTREE_INDEX_ENABLED:-false}
      # No Anthropic rate limits with local Ollama — remove the pacing delay.
      AC_MIN_TURN_DELAY_SECS: ${AC_MIN_TURN_DELAY_SECS:-0}
      # ── Egress proxy ──────────────────────────────────────────────────────
      # Route all outbound HTTP/HTTPS through the tinyproxy allowlist.
      # Standard-case and uppercase variants are both set for maximum tool
      # coverage (curl, git, npm, Python httpx/requests all check one or both).
      # NO_PROXY excludes internal Docker services that must not go through the
      # proxy: postgres, qdrant (both short name and full container name),
      # and the local LLM server on the host.
      HTTP_PROXY: "http://proxy:8888"
      HTTPS_PROXY: "http://proxy:8888"
      NO_PROXY: "localhost,127.0.0.1,postgres,qdrant,agentception-qdrant,host.docker.internal,::1"
      http_proxy: "http://proxy:8888"
      https_proxy: "http://proxy:8888"
      no_proxy: "localhost,127.0.0.1,postgres,qdrant,agentception-qdrant,host.docker.internal,::1"
    volumes:
      # gh CLI auth (read-only). Container HOME is /home/agentception.
      - ${HOME}/.config/gh:/home/agentception/.config/gh:ro
      # ── Narrow bind mounts (belt-and-suspenders for credential isolation) ──
      # Instead of mounting the full repo root (./:/app) — which would expose
      # .env and docker-compose secrets — we mount only the directories the
      # container actually needs at runtime.  The .env file (which holds
      # ANTHROPIC_API_KEY, GITHUB_TOKEN, DB_PASSWORD, etc.) is intentionally
      # excluded.  Credentials reach the container only via environment
      # variables, never via the filesystem.
      #
      # .git IS mounted because the entire dispatch pipeline requires it:
      #   _resolve_dev_sha() runs "git rev-parse origin/dev" with cwd=/app,
      #   ensure_worktree() runs "git -C /app worktree add …",
      #   and every linked worktree has a .git file pointing to /app/.git.
      # The .git directory itself contains no secrets — only objects, refs, and
      # config with the public remote URL.  Credentials are NOT stored there.
      - ./.git:/app/.git
      - ./agentception:/app/agentception
      - ./.agentception:/app/.agentception
      - ./pyproject.toml:/app/pyproject.toml
      - ./org-presets.yaml:/app/org-presets.yaml
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./tools:/app/tools
      # Linux-native node_modules — sits on top of the agentception bind mount
      # so the container's esbuild/tsc binaries (ELF) are never replaced by the
      # host's macOS binaries.  Populated from the image layer on first run via
      # Docker's volume-init copy (image content wins when the named volume is
      # empty).
      - node_modules:/app/node_modules
      # Agent worktrees: bind-mount the host directory into the container so that
      # git worktrees created inside the container are immediately visible to
      # processes on the host (e.g. an IDE) at the same absolute path.
      - ${HOME}/.agentception/worktrees/agentception:/worktrees
      # Persist HuggingFace hub files (tokens, metadata) across container restarts.
      - model_cache:/home/agentception/.cache/huggingface
      # NOTE: fastembed ONNX models are NOT stored in a named volume.
      # They are baked into the image layer at build time (see Dockerfile RUN step
      # before COPY agentception/).  A named volume would shadow the image layer —
      # if the volume was ever created before the models were correctly baked, it
      # permanently masks them, causing NO_SUCHFILE errors at runtime.  Using the
      # image layer directly is simpler and more reliable: models are always present
      # after a clean build and never go stale.
    # Use Cloudflare DNS instead of Docker's embedded resolver.
    # Docker's embedded DNS caches whichever node it gets first, and GitHub
    # occasionally has dead nodes in rotation (e.g. 140.82.116.6) that refuse
    # all connections. 1.1.1.1 performs its own health-aware routing and avoids
    # returning dead nodes. This also prevents hardcoded IPs from going stale
    # as GitHub updates its infrastructure.
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    # Let the container reach a server on the host (e.g. MLX server on port 8080).
    # Docker Desktop on Mac/Windows provides host.docker.internal by default;
    # Linux and some other runtimes do not, so we set it explicitly.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentception-net
    # The startup command is the entrypoint's $@ argument — uvicorn.
    # All privileged setup (resolv.conf, sass/npm builds, alembic, chown) is
    # handled by /entrypoint.sh before gosu drops to the agentception user.
    depends_on:
      postgres:
        condition: service_healthy
      proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1337/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # Postgres — persistent store for runs, phases, issues, and agent metadata
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: agentception-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentception
      POSTGRES_USER: agentception
      # REQUIRED: Set DB_PASSWORD in .env (e.g. openssl rand -hex 16). No default for security.
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentception-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentception -d agentception"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      # 5433 on the host — non-default to avoid collision with other local Postgres instances when
      # both docker-compose stacks run on the same machine during development.
      - "127.0.0.1:5433:5432"

  # ==========================================================================
  # Qdrant — vector store for semantic search over agent transcripts / docs
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: agentception-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agentception-net
    ports:
      - "127.0.0.1:6335:6333"
      - "127.0.0.1:6336:6334"

volumes:
  postgres_data:
    name: agentception-postgres-data
  qdrant_data:
    name: agentception-qdrant-data
  model_cache:
    name: agentception-model-cache
  node_modules:
    name: agentception-node-modules

networks:
  agentception-net:
    name: agentception-net
