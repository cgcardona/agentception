# CI workflow for cgcardona/agentception
# Runs ONLY on PRs targeting main and on direct pushes to main.
# Feature-branch → dev PRs are verified locally (mypy + tests + generate.py --check)
# before the PR is opened. CI is the final gate before production, not a feedback
# loop on every feature branch.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Docker Compose reads DB_PASSWORD from the environment.
  # A throwaway value is fine for CI — the database is ephemeral per-run.
  DB_PASSWORD: ci_test_password_ephemeral

jobs:
  # ── 0. Generated-file drift check ────────────────────────────────────────
  generated-files:
    name: Generated files up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generate.py dependencies
        run: pip install jinja2 pyyaml

      - name: Check .agentception/ outputs match .j2 templates
        # generate.py --check exits 1 if any output would change.
        # A failure here means someone edited .agentception/*.md directly
        # instead of editing the .j2 template source and re-running generate.py.
        run: python scripts/gen_prompts/generate.py --check

  # ── 1. Type-checking ─────────────────────────────────────────────────────
  typecheck:
    name: mypy (strict)
    runs-on: ubuntu-latest
    needs: generated-files
    steps:
      - uses: actions/checkout@v4

      - name: Build agentception image
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build agentception

      - name: Run mypy --strict on agentception/ and tests/
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            run --rm agentception \
            mypy agentception/ tests/

  # ── 2. Typing ceiling ────────────────────────────────────────────────────
  typing-ceiling:
    name: Typing ceiling (zero Any)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Build agentception image
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build agentception

      - name: Enforce zero-Any ceiling
        # tools/typing_audit.py counts Any-ish patterns and fails if count > threshold.
        # --max-any 0 means no Any is tolerated at all.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            run --rm agentception \
            python tools/typing_audit.py --dirs agentception/ tests/ --max-any 0

  # ── 3. Test suite + smoke ──────────────────────────────────────────────────
  # Smoke probes run in the same job so we reuse the image that was just
  # built and the postgres that is already running — no second full rebuild.
  test:
    name: pytest + smoke
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Start postgres (required by DB-backed tests)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d postgres
          # Wait until postgres is healthy (up to 60 s)
          for i in $(seq 1 12); do
            docker compose -f docker-compose.yml -f docker-compose.ci.yml \
              exec -T postgres pg_isready -U agentception -d agentception && break
            sleep 5
          done

      - name: Build agentception image
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build agentception

      - name: Run migrations
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            run --rm agentception \
            alembic -c agentception/alembic.ini upgrade head

      - name: Run test suite
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            run --rm agentception \
            pytest tests/ -v --tb=short

      - name: Start agentception and probe health
        # Image is already built; postgres is already running.
        # Start the proxy (no-op in CI) + agentception, then poll /health
        # until it responds — no second full rebuild needed.
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d proxy agentception
          for i in $(seq 1 18); do
            curl -sf http://localhost:1337/health && break
            sleep 5
          done
          curl -f http://localhost:1337/health
          curl -f http://localhost:1337/

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
